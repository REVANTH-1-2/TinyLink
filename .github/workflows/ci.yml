name: TinyLink CI/CD Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Backend Build and Test
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Run Tests
        run: |
          cd TinyLink/backend
          mvn clean test

  # Frontend Lint and Build
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: TinyLink/frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd TinyLink/frontend
          npm ci || npm install

      - name: Typecheck TypeScript and Build
        run: |
          cd TinyLink/frontend
          npm run build
