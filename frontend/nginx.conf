server {
    listen 80;
    server_name localhost;

    # Use the system's DNS resolver dynamically
    resolver ${DNS_RESOLVER} valid=10s ipv6=off;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy backend API requests
    location /api/ {
        set $backend_url http://${BACKEND_HOST}:8080/api/;
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Explicitly serve React Router routes to avoid proxying them
    location ~ ^/(dashboard|login|register|profile|settings|create|expired|disabled|p|not-found)$ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # Proxy short URL root redirections (e.g. /abc123) to backend redirect engine
    location ~ "^/([a-zA-Z0-9_-]{3,20})$" {
        set $backend_url http://${BACKEND_HOST}:8080/$1$is_args$args;
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
